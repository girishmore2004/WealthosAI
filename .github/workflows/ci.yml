name: CI

# Runs on every push/PR to main. Gates merges on: the consistency audit, the full
# backend test suite, both apps building cleanly, and the initial Prisma migration
# actually applying against a real Postgres instance (that last check matters here
# specifically because the migration in this repo was hand-derived from schema.prisma
# rather than generated by the Prisma engine — see the note at the top of
# packages/db/prisma/migrations/20260713000000_init/migration.sql).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Consistency audit (schema/routes/braces/JSON)
        run: npm run audit
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Build workspace packages
        run: npm run build:packages
      - name: Backend test suite
        run: npm run --workspace=apps/api test
      - name: Build backend
        run: npm run build:api
      - name: Build frontend
        run: npm run build:web
      - name: Frontend tests
        run: npm run --workspace=apps/web test --if-present

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wealthos
          POSTGRES_PASSWORD: wealthos_ci_password
          POSTGRES_DB: wealthos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Generate Prisma client
        working-directory: packages/db
        run: npx prisma generate
      - name: Apply the initial migration to a real Postgres instance
        working-directory: packages/db
        env:
          DATABASE_URL: "postgresql://wealthos:wealthos_ci_password@localhost:5432/wealthos?schema=public"
        run: npx prisma migrate deploy
      - name: Seed against the freshly-migrated database
        working-directory: packages/db
        env:
          DATABASE_URL: "postgresql://wealthos:wealthos_ci_password@localhost:5432/wealthos?schema=public"
        run: npx prisma db seed
